services:
  postgres:
    image: postgres:16
    container_name: medical_warehouse_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-medical_warehouse}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: medical_warehouse_app
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - .:/app
    command: ["python", "src/scraper.py"]

volumes:
  pgdata:
